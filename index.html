<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quadro Virtual CIA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 10;
    }

    body:hover #controls { opacity: 1; }

    #controls button {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    #controls button:hover { background: rgba(255, 255, 255, 0.3); }

    #dots {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 10;
    }

    body:hover #dots { opacity: 1; }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active { background: #fff; }
  </style>
</head>
<body>
  <img id="slide" src="1.png" alt="Slide" />

  <div id="dots"></div>

  <div id="controls">
    <button id="prev">&#8592;</button>
    <button id="pause">&#10074;&#10074;</button>
    <button id="next">&#8594;</button>
  </div>

  <script>
    const IMAGES = ["1.png", "2.png", "3.png", "4.png"];
    const INTERVAL = 4000;
    const FADE = 400;

    const el = document.getElementById("slide");
    const dotsEl = document.getElementById("dots");
    const pauseBtn = document.getElementById("pause");

    let current = 0;
    let paused = false;
    let timer = null;

    IMAGES.forEach((_, idx) => {
      const d = document.createElement("span");
      d.className = "dot" + (idx === 0 ? " active" : "");
      d.addEventListener("click", () => goTo(idx));
      dotsEl.appendChild(d);
    });

    IMAGES.forEach(src => { const i = new Image(); i.src = src; });

    function updateDots() {
      document.querySelectorAll(".dot").forEach((d, idx) => {
        d.classList.toggle("active", idx === current);
      });
    }

    function goTo(idx) {
      el.style.opacity = 0;
      setTimeout(() => {
        current = (idx + IMAGES.length) % IMAGES.length;
        el.src = IMAGES[current];
        el.style.opacity = 1;
        updateDots();
      }, FADE);
    }

    function next() { goTo(current + 1); }
    function prev() { goTo(current - 1); }

    function startTimer() {
      clearInterval(timer);
      timer = setInterval(() => { if (!paused) next(); }, INTERVAL);
    }

    document.getElementById("next").addEventListener("click", () => { next(); startTimer(); });
    document.getElementById("prev").addEventListener("click", () => { prev(); startTimer(); });
    document.getElementById("pause").addEventListener("click", () => {
      paused = !paused;
      pauseBtn.innerHTML = paused ? "&#9654;" : "&#10074;&#10074;";
    });

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowRight") { next(); startTimer(); }
      else if (e.key === "ArrowLeft") { prev(); startTimer(); }
      else if (e.key === " ") {
        paused = !paused;
        pauseBtn.innerHTML = paused ? "&#9654;" : "&#10074;&#10074;";
      }
    });

    startTimer();
  </script>
</body>
</html>
